<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Basic User CRUD System</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <header>
      <h1>User CRUD Dashboard</h1>
      <p>A simple frontend & backend user registration system</p>
    </header>

    <div class="content">
      <!-- Form Panel (Handles Create and Update) -->
      <div class="card form-card">
        <h2 id="form-title">Register User</h2>
        <form id="user-form">
          <!-- Hidden ID input for updating -->
          <input type="hidden" id="userId">

          <div class="form-group">
            <label for="fullName">Full Name *</label>
            <input type="text" id="fullName" required placeholder="John Doe">
          </div>

          <div class="form-group">
            <label for="email">Email Address *</label>
            <input type="email" id="email" required placeholder="john@example.com">
          </div>

          <div class="form-group">
            <label for="phone">Phone Number</label>
            <input type="text" id="phone" placeholder="123-456-7890">
          </div>

          <div class="form-group">
            <label for="role">Access Role</label>
            <select id="role">
              <option value="Viewer">Viewer</option>
              <option value="Editor">Editor</option>
              <option value="Admin">Admin</option>
            </select>
          </div>

          <div class="form-actions">
            <button type="submit" id="btn-submit" class="btn btn-primary">Save User</button>
            <button type="button" id="btn-cancel" class="btn btn-secondary" style="display: none;" onclick="resetForm()">Cancel</button>
          </div>
        </form>
      </div>

      <!-- Directory/Table Panel (Handles Read and Delete) -->
      <div class="card table-card">
        <h2>Registered Users</h2>
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>Name</th>
                <th>Email</th>
                <th>Phone</th>
                <th>Role</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="user-table-body">
              <!-- Populated via JavaScript -->
              <tr>
                <td colspan="5" style="text-align: center;">Loading users...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
